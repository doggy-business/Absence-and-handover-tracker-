<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workforce Intelligence Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Workforce Intelligence Dashboard</h1>

  <div class="nav">
    <button onclick="showSection('leave')">Leave Request</button>
    <button onclick="showSection('handover')">Handover</button>
    <button onclick="showSection('dashboard')">Dashboard</button>
  </div>

  <div id="leave" class="section">
    <h2>Request Leave</h2>
    <p>Request time off and see availability instantly.</p>

    <label for="name">Name</label>
    <input type="text" id="name" placeholder="Enter your name" />

    <label for="startDate">Start Date</label>
    <input type="date" id="startDate" />

    <label for="endDate">End Date</label>
    <input type="date" id="endDate" />

    <button onclick="submitLeave()">Check Availability</button>

    <p id="leaveResult"></p>
  </div>

  <div id="handover" class="section hidden">
    <h2>Handover Tasks</h2>

    <label for="task">Task</label>
    <input type="text" id="task" placeholder="Enter task" />

    <label for="owner">Assign To</label>
    <input type="text" id="owner" placeholder="Enter owner name" />

    <label for="priority">Priority</label>
    <select id="priority">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <button onclick="addTask()">Add Task</button>

    <ul id="taskList"></ul>
  </div>

  <div id="dashboard" class="section hidden">
    <h2>Leadership Dashboard</h2>

    <button onclick="generateSummary()">Generate Daily Summary</button>

    <pre id="summary"></pre>
  </div>

  <script src="script.js"></script>
</body>
</html>
